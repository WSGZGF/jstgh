function detectDevice() {
  const ua = navigator.userAgent;
  let brand = '', model = '';
  // iOS 精确识别
  const iosMatch = ua.match(/iPhone\d+,\d+/);
  if (iosMatch && IOS_MAP[iosMatch[0]]) {
    return { brand: 'iPhone', model: IOS_MAP[iosMatch[0]], raw: iosMatch[0] };
  }
  if (/iPhone/i.test(ua)) return { brand: 'iPhone', model: '', raw: 'iPhone' };
  if (/iPad/i.test(ua)) return { brand: 'iPad', model: '', raw: 'iPad' };
  // Android
  if (/Huawei|HONOR/i.test(ua)) brand = '华为';
  else if (/Xiaomi|MI\s/i.test(ua)) brand = '小米';
  else if (/Redmi/i.test(ua)) brand = '红米';
  else if (/OPPO/i.test(ua)) brand = 'OPPO';
  else if (/vivo/i.test(ua)) brand = 'vivo';
  else if (/OnePlus/i.test(ua)) brand = '一加';
  else if (/realme/i.test(ua)) brand = '真我';
  else if (/Samsung/i.test(ua)) brand = '三星';
  else if (/Meizu/i.test(ua)) brand = '魅族';
  // 从 UA 尝试提取型号
  const m = ua.match(/Build\/([A-Z0-9\-]+)/);
  if (m) model = m[1];
  return { brand, model, raw: ua };
}

function escapeHTML(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function highlight(text, q) {
  if (!q) return escapeHTML(text);
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx < 0) return escapeHTML(text);
  return escapeHTML(text.slice(0, idx)) + '<mark>' + escapeHTML(text.slice(idx, idx+q.length)) + '</mark>' + escapeHTML(text.slice(idx+q.length));
}

function matchEntry(entry, q) {
  if (!q) return { hit: true, where: '' };
  const ql = q.toLowerCase();
  if (entry.code.toLowerCase().includes(ql)) return { hit: true, where: 'code:' + entry.code };
  if ((entry.sub||'').toLowerCase().includes(ql)) return { hit: true, where: 'sub:' + entry.sub };
  for (const b of entry.brands) {
    if (b.brand.toLowerCase().includes(ql)) return { hit: true, where: 'brand:' + b.brand };
    for (const m of b.models) {
      if (m.toLowerCase().includes(ql)) return { hit: true, where: 'model:' + m, brand: b.brand };
    }
  }
  return { hit: false };
}

function renderList(entries, q) {
  const list = document.getElementById('list');
  const count = document.getElementById('count');
  if (!entries.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>没找到匹配的型号<br>试试其他关键字</div>';
    count.textContent = '';
    return;
  }
  count.textContent = `找到 ${entries.length} 款` + (q ? ` · 关键字「${q}」` : '');
  list.innerHTML = entries.map(e => {
    const preview = e.brands.slice(0, 3).map(b => {
      const m = b.models.slice(0, 4).map(x => highlight(x, q)).join(' / ');
      return `<span class="brand-tag ${q && b.brand.toLowerCase().includes(q.toLowerCase()) ? 'match' : ''}">${highlight(b.brand, q)}：${m}${b.models.length>4?' …':''}</span>`;
    }).join('');
    return `<div class="card" data-code="${e.code}">
      <div class="card-head">
        <span class="code">${highlight(e.code, q)}</span>
        <span class="sub">${highlight(e.sub, q)}</span>
        <span class="type">${escapeHTML(e.type)}</span>
      </div>
      <div class="card-brands">${preview}</div>
    </div>`;
  }).join('');
  list.querySelectorAll('.card').forEach(c => {
    c.addEventListener('click', () => openDetail(c.dataset.code));
  });
}

function openDetail(code) {
  const entry = FILMS.find(e => e.code === code);
  if (!entry) return;
  const list = document.getElementById('list');
  list.innerHTML = `<div class="detail" style="position:relative">
    <button class="close-detail" onclick="renderList(FILMS, document.getElementById('q').value); document.getElementById('count').textContent='找到 '+FILMS.length+' 款';">×</button>
    <h2>${escapeHTML(entry.sub || '钢化膜')}</h2>
    <div class="code-big">${escapeHTML(entry.code)}</div>
    <div class="info">${escapeHTML(entry.name)} · ${escapeHTML(entry.type)}</div>
    ${entry.brands.map(b => `<div class="brand-group">
      <div class="brand-name">${escapeHTML(b.brand)} · ${b.models.length} 款</div>
      <div class="model-chips">${b.models.map(m => `<span class="model-chip">${escapeHTML(m)}</span>`).join('')}</div>
    </div>`).join('')}
  </div>`;
  list.scrollIntoView({behavior:'smooth'});
}

function setupQuickPick(brand) {
  const brands = ['iPhone','华为','小米','红米','OPPO','vivo','一加','真我','三星','魅族'];
  document.getElementById('quickPick').innerHTML = brands.map(b =>
    `<button data-b="${b}" style="${b===brand?'background:#3a7bd5;color:#fff;border-color:#3a7bd5':''}">${b}</button>`
  ).join('');
  document.querySelectorAll('#quickPick button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('q').value = btn.dataset.b;
      document.getElementById('q').dispatchEvent(new Event('input'));
    });
  });
}

function init() {
  const det = detectDevice();
  const detectEl = document.getElementById('detect');
  if (det.model) {
    detectEl.innerHTML = `检测到您的设备：<b>${escapeHTML(det.model)}</b> · 已自动填入搜索`;
    document.getElementById('q').value = det.model;
  } else if (det.brand) {
    detectEl.innerHTML = `检测到品牌：<b>${escapeHTML(det.brand)}</b> · 点击下方按钮或输入完整型号`;
  } else {
    detectEl.innerHTML = '请直接输入您手机的品牌或型号';
  }
  setupQuickPick(det.brand);
  const q = document.getElementById('q').value.trim();
  const filtered = FILMS.filter(e => matchEntry(e, q).hit);
  renderList(filtered, q);

  let timer;
  document.getElementById('q').addEventListener('input', e => {
    clearTimeout(timer);
    const v = e.target.value.trim();
    timer = setTimeout(() => {
      const f = FILMS.filter(en => matchEntry(en, v).hit);
      renderList(f, v);
    }, 80);
  });
}

init();
</script>
